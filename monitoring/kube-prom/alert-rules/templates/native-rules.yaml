{{- /*
PrometheusRule for AIStore alerts based on metrics exposed by AIS.

Note on escaping: Prometheus alert templating uses `{{ $labels.x }}`, which
collides with Helm's templating. Each description string is wrapped in a
backtick-delimited go-template literal (`{{` ... `}}`) so it passes through
unchanged.
*/ -}}
{{- include "ais-alert-rules.validateDiskType" . -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-native
  namespace: {{ .Release.Namespace }}
  labels:
    app: ais-alert-rules
    release: {{ .Values.prometheusReleaseLabel }}
spec:
  groups:
    - name: AIStoreNativeAlerts
      rules:
        {{- if eq .Values.disk.type "hdd" }}
        - alert: AISHighDiskIOUtilization
          expr: ais_target_disk_util{cluster=~"{{ .Values.clusterRegex }}"} > 95
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: High Disk IO Utilization on AIS Disks
            description: {{`"Disk IO utilization on disk '{{ $labels.disk }}' in AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') is above 95% for a continuous period of 10 minutes."`}}
        {{- end }}
        - alert: AISTargetRestart
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 128)) % 2 == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: AIS Target Restart Detected
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') has restarted."`}}
        - alert: AISChecksumError
          expr: increase(ais_target_err_put_cksum_count{cluster=~"{{ .Values.clusterRegex }}"}[5m]) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: Checksum Error Detected on AIS Target
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') has encountered a checksum error."`}}
        - alert: AISVoteInProgress
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 1)) % 2 == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: AIS Primary Proxy Election Vote In Progress
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') is currently voting."`}}
        - alert: AISRebalancing
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 8)) % 2 == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: AIS Rebalancing
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') is rebalancing."`}}
        - alert: AISRebalanceInterrupted
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 16)) % 2 == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: AIS Rebalance Interrupted
            description: {{`"AIS rebalance has been interrupted on AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}')."`}}
        - alert: AISResilvering
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 32)) % 2 == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: AIS Resilvering
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') is resilvering."`}}
        - alert: AISResilverInterrupted
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 64)) % 2 == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: AIS Resilver Interrupted
            description: {{`"AIS resilvering has been interrupted on AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}')."`}}
        - alert: AISOutOfSpace
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 256)) % 2 == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: AIS Node Out Of Space
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') is out of space."`}}
        - alert: AISOutOfMemory
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 512)) % 2 == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: AIS Node Out Of Memory
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') is out of memory."`}}
        - alert: AISMaintenanceMode
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 1024)) % 2 == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: AIS Node in Maintenance Mode
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') is in maintenance mode."`}}
        - alert: AISLowCapacity
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 2048)) % 2 == 1
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: AIS Low Capacity
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') reports low remaining storage capacity and is at risk of running out of space soon."`}}
        - alert: AISLowMemory
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 4096)) % 2 == 1
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: AIS Low Memory
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') reports low memory and is at risk of running out of memory soon."`}}
        - alert: AISDiskFault
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 8192)) % 2 == 1
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: AIS Disk Fault
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') has encountered a disk fault."`}}
        - alert: AISNumGoroutines
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 16384)) % 2 == 1
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: AIS High Number of Goroutines
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') has a high goroutine count (above normal levels), possibly indicating performance issues."`}}
        - alert: AISHighNumGoroutines
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 32768)) % 2 == 1
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: AIS High Number of Goroutines
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') has a high number of goroutines, indicating potential performance issues."`}}
        - alert: AISCertWillSoonExpire
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 65536)) % 2 == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: AIS Node Certificate Expiring Soon
            description: {{`"The certificate on AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') will expire soon."`}}
        - alert: AISCertificateExpired
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 131072)) % 2 == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: AIS Node Certificate Expired
            description: {{`"The certificate on AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') has expired."`}}
        - alert: AISCertificateInvalid
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 262144)) % 2 == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: AIS Node Certificate Invalid
            description: {{`"The certificate on AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') is invalid."`}}
        - alert: AISKeepAliveErrors
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 524288)) % 2 == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: AIS KeepAlive Errors Detected
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') has encountered keep-alive errors within the last 5 minutes."`}}
        - alert: AISOutOfCPU
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 1048576)) % 2 == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: AIS Node Out of CPU
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') is out of CPU resources, with utilization exceeding 95%."`}}
        - alert: AISGetRetryRatioHighWarn
          expr: (sum by (bucket, cluster) (rate(ais_target_ratelim_retry_get_count{cluster=~"{{ .Values.clusterRegex }}"}[5m])) /sum by (bucket, cluster) (rate(ais_target_get_count{cluster=~"{{ .Values.clusterRegex }}"}[5m]))) > 0.01 and sum by (bucket, cluster) (rate(ais_target_get_count{cluster=~"{{ .Values.clusterRegex }}"}[5m])) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: High GET retry ratio (rate limit)
            description: {{`"Bucket {{ $labels.bucket }} GET retry ratio > 1%."`}}
        - alert: AISGetRetryRatioCritical
          expr: (sum by (bucket, cluster) (rate(ais_target_ratelim_retry_get_count{cluster=~"{{ .Values.clusterRegex }}"}[5m])) /sum by (bucket, cluster) (rate(ais_target_get_count{cluster=~"{{ .Values.clusterRegex }}"}[5m]))) > 0.05 and sum by (bucket, cluster) (rate(ais_target_get_count{cluster=~"{{ .Values.clusterRegex }}"}[5m])) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: High GET retry ratio (rate limit)
            description: {{`"Bucket {{ $labels.bucket }} GET retry ratio > 5%."`}}
        - alert: AISPutRetryRatioWarn
          expr: (sum by (bucket, cluster) (rate(ais_target_ratelim_retry_put_count{cluster=~"{{ .Values.clusterRegex }}"}[5m])) /sum by (bucket, cluster) (rate(ais_target_put_count{cluster=~"{{ .Values.clusterRegex }}"}[5m]))) > 0.01 and sum by (bucket, cluster) (rate(ais_target_put_count{cluster=~"{{ .Values.clusterRegex }}"}[5m])) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: High PUT retry ratio (rate limit)
            description: {{`"Bucket {{ $labels.bucket }} PUT retry ratio > 1%."`}}
        - alert: AISPutRetryRatioCritical
          expr: (sum by (bucket, cluster) (rate(ais_target_ratelim_retry_put_count{cluster=~"{{ .Values.clusterRegex }}"}[5m])) /sum by (bucket, cluster) (rate(ais_target_put_count{cluster=~"{{ .Values.clusterRegex }}"}[5m]))) > 0.05 and sum by (bucket, cluster) (rate(ais_target_put_count{cluster=~"{{ .Values.clusterRegex }}"}[5m])) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: High PUT retry ratio (rate limit)
            description: {{`"Bucket {{ $labels.bucket }} PUT retry ratio > 5%."`}}
        - alert: AISLowCPU
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 2097152)) % 2 == 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: AIS Node Low CPU Availability
            description: {{`"AIS target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') has low CPU availability, with utilization exceeding 80%."`}}
        - alert: AISDiskOOS
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 4194304)) % 2 == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: AIS Disk Out Of Space
            description: {{`"AIS disk on target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') is out of space."`}}
        # "disk low capacity" at the mountpath level
        - alert: AISDiskLowCapacity
          expr: (floor(ais_target_state_flags{cluster=~"{{ .Values.clusterRegex }}"} / 8388608)) % 2 == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: AIS Disk Low Capacity
            description: {{`"AIS disk on target pod '{{ $labels.pod }}' (AIS node_id '{{ $labels.node_id }}', instance '{{ $labels.instance }}') has low available capacity."`}}
