environments:
  local: {}
  sjc11:
    kubeContext: sjc11
---
releases:
  # Defines a self-signed issuer for acquiring a tls cert
  - name: issuer
    namespace: "{{ .Values | get \"namespace\" \"cert-manager\" }}"
    createNamespace: true
    chart: issuer-chart
    version: 0.1.0
    values:
      - "./config/{{ .Environment.Name }}.yaml"