cluster: ais
# size:
protocol: http
imagePullSecrets:
# - name:
nodeImage:
  name: docker.io/aistorage/aisnode
  tag: v4.8
initImage:
  name: docker.io/aistorage/ais-init
  tag: v4.8
# logSidecar configures the log-collection sidecar (image + resources).
# `logSidecarImage` is deprecated.
logSidecar:
  image:
    name: docker.io/aistorage/ais-logs
    tag: v1.1
cloud:
  awsSecretName:
  gcpSecretName:
  ociSecretName:
configToUpdate:
shutdownCluster: false
cleanupData: false
cleanupMetadata: false
apiMode: 
clusterDomain:
stateStorage:
stateStorageClass:
authNSecretName:
auth:
operatorSkipVerifyCrt:
enableExternalLB: false
publicNetDNSMode:
logsDir:
proxySpec:
  tolerations:
    - key: "node.kubernetes.io/disk-pressure"
      operator: "Exists"
      effect: "NoExecute"
  hostPort: 51080
  servicePort: 51080
  portPublic: 51080
  portIntraControl: 51082
  portIntraData: 51083
  externalAccess:
    enabled: false
    annotations: {}

targetSpec:
  tolerations:
    - key: "node.kubernetes.io/disk-pressure"
      operator: "Exists"
      effect: "NoExecute"
  hostPort: 51081
  servicePort: 51081
  portPublic: 51081
  portIntraControl: 51082
  portIntraData: 51083
  externalAccess:
    enabled: false
    annotations: {}
  pdb:
    enabled: false

# Deprecated: use proxySpec.externalAccess with operator >= 3.1.0 instead.
# proxyLB creates a standalone shared proxy LoadBalancer Service, independent of the
# operator version, for operator-managed deployments that predate proxySpec.externalAccess.
proxyLB:
  enabled: false
  port: 51080
  annotations:
    prometheus.io/scrape: "true"

adminClient:
  enabled: false
