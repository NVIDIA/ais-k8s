{{- include "ais-cluster.validateStateStorageClass" . -}}
apiVersion: ais.nvidia.com/v1beta1
kind: AIStore
metadata:
  name: {{ .Values.cluster }}
  namespace: {{ .Release.Namespace }}
  {{- if .Values.metadata }}
  {{- with .Values.metadata.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
spec:
  size: {{ .Values.size }}
  configToUpdate:
    {{- if eq .Values.protocol "https" }}
      {{- $baseConfig := default (dict) .Values.configToUpdate }}
      {{- $userHTTP := (dig "net" "http" dict $baseConfig) }}
      {{- $httpsDefaults := dict
          "use_https" true
          "skip_verify" .Values.tls.skipVerifyCert
          "client_auth_tls" 0
      }}
      {{- /* Operator manages /var/certs/* whenever spec.tls is set */}}
      {{- if not (or .Values.tls.secretName .Values.tls.certificate) }}
        {{- $httpsDefaults = merge $httpsDefaults (dict
            "server_crt" "/var/certs/tls.crt"
            "server_key" "/var/certs/tls.key"
            "client_ca_tls" "/var/certs/ca.crt"
        ) }}
      {{- end }}
      {{- $mergedHTTP := merge $httpsDefaults $userHTTP }}
      {{- $userNet := (dig "net" dict $baseConfig) }}
      {{- $mergedNet := merge (dict "http" $mergedHTTP) $userNet }}
      {{- toYaml (merge (dict "net" $mergedNet) (omit $baseConfig "net")) | nindent 4 }}
    {{- else }}
      {{- with .Values.configToUpdate }}
      {{- toYaml . | nindent 4 }}
      {{- end }}
    {{- end }}
  proxySpec:
    {{- with .Values.proxySpec.annotations }}
    annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.proxySpec.labels }}
    labels:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.proxySpec.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.proxySpec.env }}
    env:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if .Values.proxySpec.size }}
    size: {{ .Values.proxySpec.size }}
    {{- end }}
    hostPort: {{ .Values.proxySpec.hostPort }}
    servicePort: {{ .Values.proxySpec.servicePort }}
    portPublic: {{ .Values.proxySpec.portPublic }}
    portIntraControl: {{ .Values.proxySpec.portIntraControl }}
    portIntraData: {{ .Values.proxySpec.portIntraData }}
    {{- /* Backwards compatible spec option for operator <= v2.19.0 */}}
    capabilities:
      {{- toYaml (default (dict "privileged" true) .Values.proxySpec.aisContainerSecurityContext) | nindent 6 }}
    {{- if .Values.proxySpec.securityContext }}
    securityContext:
      {{- toYaml .Values.proxySpec.securityContext | nindent 6 }}
    {{- end }}
    nodeSelector:
      {{- if .Values.proxySpec.nodeSelector }}
        {{- toYaml .Values.proxySpec.nodeSelector | nindent 6 }}
      {{- else }}
        nvidia.com/ais-proxy: {{ .Values.cluster | quote }}
      {{- end }}
    {{- if .Values.proxySpec.resources }}
    resources:
      {{- toYaml .Values.proxySpec.resources | nindent 6 }}
    {{- end }}
    {{- include "ais-cluster.proxyExternalAccess" . | nindent 4 }}
  targetSpec:
    {{- with .Values.targetSpec.annotations }}
    annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.targetSpec.labels }}
    labels:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.targetSpec.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.targetSpec.env }}
    env:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if .Values.targetSpec.size }}
    size: {{ .Values.targetSpec.size }}
    {{- end }}
    hostPort: {{ .Values.targetSpec.hostPort }}
    servicePort: {{ .Values.targetSpec.servicePort }}
    portPublic: {{ .Values.targetSpec.portPublic }}
    portIntraControl: {{ .Values.targetSpec.portIntraControl }}
    portIntraData: {{ .Values.targetSpec.portIntraData }}
    {{- /* Backwards compatible spec option for operator <= v2.19.0 */}}
    capabilities:
      {{- toYaml (default (dict "privileged" true) .Values.targetSpec.aisContainerSecurityContext) | nindent 6 }}
    {{- if hasKey .Values.targetSpec "hostNetwork" }}
    hostNetwork: {{ .Values.targetSpec.hostNetwork }}
    {{- end }}
    {{- if .Values.targetSpec.securityContext }}
    securityContext:
      {{- toYaml .Values.targetSpec.securityContext | nindent 6 }}
    {{- end }}
    nodeSelector:
      {{- if .Values.targetSpec.nodeSelector }}
        {{ toYaml .Values.targetSpec.nodeSelector | nindent 6 }}
      {{- else }}
          nvidia.com/ais-target: {{ .Values.cluster | quote }}
      {{- end }}
    mounts:
    {{- $mpath := .Values.mpathInfo }}
    {{- range $mpath.mounts }}
      - path: {{ .path }}
        {{- if $mpath.useHostPath }}
        useHostPath: true
        {{- else }}
        {{- if not $mpath.size }}
        {{- fail "mpathInfo.size is required for non-hostPath mounts" }}
        {{- end }}
        {{- if not $mpath.storageClass }}
        {{- fail "mpathInfo.storageClass is required for non-hostPath mounts" }}
        {{- end }}
        size: {{ $mpath.size }}
        storageClass: {{ $mpath.storageClass }}
        selector:
          matchLabels:
            mpath: pv-{{ .path | replace "/" "-" | trimPrefix "-" }}
        {{- end }}
        {{- if .label }}
        label: {{ .label }}
        {{- end }}
    {{- end }}
    {{- if .Values.targetSpec.resources }}
    resources:
      {{- toYaml .Values.targetSpec.resources | nindent 6 }}
    {{- end }}
    {{- if .Values.targetSpec.pdb }}
    {{- if .Values.targetSpec.pdb.enabled }}
    pdb:
      enabled: true
      {{- if hasKey .Values.targetSpec.pdb "maxUnavailable" }}
      maxUnavailable: {{ .Values.targetSpec.pdb.maxUnavailable }}
      {{- end }}
    {{- end }}
    {{- end }}
    {{- include "ais-cluster.targetExternalAccess" . | nindent 4 }}
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
  {{- toYaml . | nindent 2 }}
  {{- end }}
  nodeImage: "{{ .Values.nodeImage.name }}:{{ .Values.nodeImage.tag }}"
  initImage: "{{ .Values.initImage.name }}:{{ .Values.initImage.tag }}"
  {{- include "ais-cluster.logSidecar" . | nindent 2 }}
  {{- with include "ais-cluster.stateStorage" . }}
  {{- . | nindent 2 }}
  {{- end }}
  {{- with .Values.apiMode }}
  apiMode: {{ . }}
  {{- end }}
  shutdownCluster: {{ .Values.shutdownCluster }}
  cleanupMetadata: {{ .Values.cleanupMetadata }}
  cleanupData: {{ .Values.cleanupData }}
  {{- if eq .Values.protocol "https" }}
  {{- if or .Values.tls.secretName .Values.tls.certificate }}
  tls:
    {{- with .Values.tls.secretName }}
    secretName: {{ . }}
    {{- end }}
    {{- if .Values.tls.certificate }}
    certificate:
      issuerRef:
        name: {{ .Values.tls.certificate.issuerRef.name }}
        {{- if .Values.tls.certificate.issuerRef.kind }}
        kind: {{ .Values.tls.certificate.issuerRef.kind }}
        {{- end }}
      {{- if .Values.tls.certificate.additionalDNSNames }}
      additionalDNSNames:
        {{- toYaml .Values.tls.certificate.additionalDNSNames | nindent 8 }}
      {{- end }}
      {{- if .Values.tls.certificate.duration }}
      duration: {{ .Values.tls.certificate.duration }}
      {{- end }}
      {{- if .Values.tls.certificate.renewBefore }}
      renewBefore: {{ .Values.tls.certificate.renewBefore }}
      {{- end }}
      {{- if .Values.tls.certificate.mode }}
      mode: {{ .Values.tls.certificate.mode }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- end }}
  {{- if .Values.cloud }}
  {{- with .Values.cloud.awsSecretName }}
  awsSecretName: {{ . }}
  {{- end }}
  {{- with .Values.cloud.gcpSecretName }}
  gcpSecretName: {{ . }}
  {{- end }}
  {{- with .Values.cloud.ociSecretName }}
  ociSecretName: {{ . }}
  {{- end }}
  {{- end }}
  {{- with .Values.authNSecretName }}
  authNSecretName: {{ . }}
  {{- end }}
  {{- if .Values.auth }}
  auth:
    {{- toYaml .Values.auth | nindent 4 }}
  {{- end }}
  {{- if ne .Values.operatorSkipVerifyCrt nil }}
  operatorSkipVerifyCrt: {{ .Values.operatorSkipVerifyCrt }}
  {{- end }}
  enableExternalLB: {{ .Values.enableExternalLB }}
  {{- with .Values.publicNetDNSMode }}
  publicNetDNSMode: {{ . }}
  {{- end }}
  {{- if .Values.multihome }}
  {{- with .Values.multihome.hostnameMap }}
  hostnameMap: {{ toJson . }}
  {{- end }}
  {{- if .Values.multihome.networkAttachment }}
  networkAttachment: "{{ .Values.multihome.networkAttachment }}"
  {{- end }}
  {{- end }}
  {{- with .Values.logsDir }}
  logsDir: {{ . }}
  {{- end }}
  {{- with .Values.clusterDomain }}
  clusterDomain: {{ . }}
  {{- end }}
  {{- with .Values.adminClient }}
  adminClient:
    {{- toYaml . | nindent 4 }}
  {{- end }}