apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-create-pv
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-create-pv
    spec:
      serviceAccountName: {{ .Release.Name }}-create-pv
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: create-pvs
          image: "{{ .Values.kubectlImage.repository }}:{{ .Values.kubectlImage.tag }}"
          imagePullPolicy: {{ .Values.kubectlImage.pullPolicy }}
          command: ["bash", "/scripts/create-pvs.sh"]
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: {{ .Release.Name }}-create-pv-script
            defaultMode: 0755
