# Config for local KinD cluster, used by /local/test-cluster.sh
cluster: ais
mpathInfo:
  storageClass: "ais-local-storage"
  size: 5.8Ti
  # Apply shared label to run on one physical disk (for development/testing)
  mounts:
    - path: /ais/1
      label: shared
    - path: /ais/2
      label: shared
    - path: /ais/3
      label: shared
size: 3
protocol: https
tls:
  skipVerifyCert: false
  certificate:
    issuerRef:
      name: ca-issuer
      kind: ClusterIssuer
    mode: csi
    additionalDNSNames:
      - "localhost"
      - "local-test-worker"
      - "local-test-worker2"
      - "local-test-worker3"
nodeImage:
  tag: v4.4
initImage:
  tag: v4.4
logSidecarImage:
  tag: v1.1
adminClient:
  enabled: true
  # Use trust manager bundle for client
  caConfigMap:
    name: aistore.nvidia.com
    key: ca.crt
proxyLB:
  enabled: true
# Allows DNS to be based solely on node name, not IP
publicNetDNSMode: Node

configToUpdate:
  # Lower than default values to allow for running without alerts on KinD docker nodes
  memsys:
    min_free: "512MiB"
    to_gc: "512MiB"


stateStorageClass: "openebs-hostpath"
cleanupMetadata: true