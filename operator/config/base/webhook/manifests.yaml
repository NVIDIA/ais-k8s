---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  - v1beta1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-ais-nvidia-com-v1beta1-aistore
  failurePolicy: Fail
  name: vaistore.kb.io
  rules:
  - apiGroups:
    - ais.nvidia.com
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    - UPDATE
    resources:
    - aistores
  sideEffects: None
- admissionReviewVersions:
  - v1
  - v1beta1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-auth-ais-nvidia-com-v1alpha1-aistoreauth
  failurePolicy: Fail
  name: vaistoreauth.kb.io
  rules:
  - apiGroups:
    - auth.ais.nvidia.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - aistoreauths
  sideEffects: None
