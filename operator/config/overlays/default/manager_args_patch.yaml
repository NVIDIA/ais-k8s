apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - "--health-probe-bind-address=:8081"
        - "--metrics-cert-path=/tmp/k8s-metrics-server/metrics-certs"
        - "--metrics-bind-address=:8443"
        - "--webhook-cert-path=/tmp/k8s-webhook-server/serving-certs"
        - "--leader-elect"
